<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Computation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="p-4">

    <h2>Payroll Beta</h2>

    <form id="workForm">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Work Days per Week</label>
                <input
                    type="number"
                    class="form-control"
                    name="work_days_per_week"
                    value="5"
                    min="1"
                    required
                >
            </div>

            <div class="col-md-4 mb-3">
                <label class="form-label">Work Days per Year <small>(Example: 261)</small></label>
                <input
                    type="number"
                    class="form-control"
                    name="work_days_per_year"
                    placeholder="Enter total days"
                    min="1"
                    required
                >
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: flex-start;">
            <div class="col-md-6 mb-1">
                <label class="form-label">Fixed Rate <small>(Example: 28000)</small></label>
                <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    name="fixed_rate"
                    placeholder="Enter amount"
                    min="0"
                    required
                >
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label d-block m-0"><small>Rate Type</small></label>

                <div class="form-check form-check-inline">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="rate_type"
                        value="monthly"
                        checked
                    >
                    <label class="form-check-label"><small>Monthly</small></label>
                </div>

                <div class="form-check form-check-inline">
                    <input
                        class="form-check-input"
                        type="radio"
                        name="rate_type"
                        value="daily"
                    >
                    <label class="form-check-label"><small>Daily</small></label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Compute</button>
    </form>

    <div class="mt-5">
        <h4>Computation Result:</h4>

        <table class="table table-bordered" id="resultTable" style="display: none;">
            <tbody>
                <tr>
                    <th width="40%">Work Days per Week</th>
                    <td id="r_workdays_week"></td>
                </tr>
                <tr>
                    <th>Bi-Weekly Workdays</th>
                    <td id="r_biweekly"></td>
                </tr>
                <tr>
                    <th>Work Days per Year</th>
                    <td id="r_yearly"></td>
                </tr>

                <!-- Dynamic row -->
                <tr class="table-warning">
                    <th id="r_fixed_rate_label"></th>
                    <td id="r_fixed_rate_value"></td>
                </tr>

                <tr class="table-primary">
                    <th>Annual Salary</th>
                    <td id="r_annual"></td>
                </tr>
                <tr class="table-success">
                    <th>Daily Rate</th>
                    <td id="r_daily"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        const form = document.getElementById('workForm');
        const resultTable = document.getElementById('resultTable');

        function formatNumber(value, decimals = 2) {
            return Number(value).toLocaleString('en-US', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            });
        }

        function setText(id, value) {
            document.getElementById(id).innerText = value;
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();

            const workdaysPerWeek = parseFloat(document.querySelector('[name="work_days_per_week"]').value) || 0;
            const workdaysPerYear = parseFloat(document.querySelector('[name="work_days_per_year"]').value) || 0;
            const fixedRate = parseFloat(document.querySelector('[name="fixed_rate"]').value) || 0;
            const rateType = document.querySelector('[name="rate_type"]:checked').value;

            const monthsInYear = 12;
            const biWeeklyWorkdays = workdaysPerWeek * 2;

            let annualSalary = 0;
            let dailyRate = 0;
            let fixedRateLabel = '';
            let fixedRateValue = '';

            if (rateType === 'monthly') {
                annualSalary = fixedRate * monthsInYear;
                dailyRate = workdaysPerYear > 0 ? annualSalary / workdaysPerYear : 0;
                // dailyRate = annualSalary / workdaysPerYear;

                fixedRateLabel = 'Monthly Rate';
                fixedRateValue = formatNumber(fixedRate);
            } else {
                annualSalary = fixedRate * workdaysPerYear;
                dailyRate = fixedRate;

                fixedRateLabel = 'Daily Rate Input';
                fixedRateValue = formatNumber(fixedRate);
            }

            setText('r_workdays_week', formatNumber(workdaysPerWeek, 0));
            setText('r_biweekly', formatNumber(biWeeklyWorkdays, 0));
            setText('r_yearly', formatNumber(workdaysPerYear, 0));
            setText('r_fixed_rate_label', fixedRateLabel);
            setText('r_fixed_rate_value', formatNumber(fixedRate));
            setText('r_annual', formatNumber(annualSalary));
            setText('r_daily', formatNumber(dailyRate));

            resultTable.style.display = 'table';

            console.log('--------------------------------------');
            console.log('Rate Type =', rateType);
            console.log('Work Days Per Week =', workdaysPerWeek);
            console.log('Bi Weekly Workdays =', biWeeklyWorkdays);
            console.log('Work Days Per Year =', workdaysPerYear);
            console.log('Fixed Rate =', fixedRate);
            console.log('Annual Salary =', annualSalary);
            console.log('Daily Rate =', dailyRate);
            console.log('--------------------------------------');
        });
    </script>
</body>
</html>
